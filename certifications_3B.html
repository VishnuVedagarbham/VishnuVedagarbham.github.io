<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification - Vishnu Vedagarbham</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css?family=Inter:400,700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="certifications.html" class="return-home-btn">&larr; Back to Certifications</a>
    <div class="main-content-centered indented-content">
        <section class="about-section">
            <div class="job-details" style="max-width: 900px; margin: 2rem auto; padding: 2rem; background: rgba(10, 25, 49, 0.7); border-radius: 10px;">
                <h3 style="color: #5ed6ff; margin-bottom: 0.5rem; font-size: 1.5rem;">
                    [Certification Name]
                </h3>
                
                <div class="company-row" style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: #a0aec0;">
                    <span class="company" style="font-weight: 500;">
                        [Issuing Organization]
                    </span>
                    <span class="duration" style="font-style: italic;">
                        [Month Year]
                    </span>
                </div>
                
                <div style="margin-bottom: 1.5rem; line-height: 1.6; color: #e2e8f0;">
                    [Certification description and key details]
                </div>
                
                <h4 style="color: #5ed6ff; margin: 1.5rem 0 0.75rem 0; font-size: 1.1rem;">Key Skills Gained:</h4>
                <ul class="responsibilities" style="margin-bottom: 1.5rem; padding-left: 1.5rem; color: #e2e8f0;">
                    <li style="margin-bottom: 0.5rem; line-height: 1.6;">[Skill/Concept 1]</li>
                    <li style="margin-bottom: 0.5rem; line-height: 1.6;">[Skill/Concept 2]</li>
                    <li style="margin-bottom: 0.5rem; line-height: 1.6;">[Skill/Concept 3]</li>
                </ul>
                
                <div class="skills-used" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem;">
                    <span class="skill-tag" style="background: rgba(94, 214, 255, 0.2); color: #5ed6ff; padding: 0.35rem 0.75rem; border-radius: 15px; font-size: 0.85rem;">
                        [Category 1]
                    </span>
                    <span class="skill-tag" style="background: rgba(94, 214, 255, 0.2); color: #5ed6ff; padding: 0.35rem 0.75rem; border-radius: 15px; font-size: 0.85rem;">
                        [Category 2]
                    </span>
                </div>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <a href="#" class="btn primary" style="display: inline-block; background: #1a365d; color: white; padding: 0.6rem 1.5rem; border-radius: 5px; text-decoration: none; transition: all 0.3s ease; border: 1px solid rgba(94, 214, 255, 0.3);">
                        View Certificate
                    </a>
                </div>
            </div>
        </section>
    </div>
    <a href="contact.html" class="contact-me-btn">Contact Me</a>
</body>
</html>
