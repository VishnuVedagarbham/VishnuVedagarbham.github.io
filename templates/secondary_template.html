<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}} - Vishnu Vedagarbham</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css?family=Inter:400,700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }
        body {
            background: url('../images/Vishnu Vedagarbham picture.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #f8f9fa;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 13, 25, 0.85);
            z-index: -1;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>
    <a href="index.html#introduction" class="return-home-btn">&larr; Return to Home</a>
    <div class="main-content-centered indented-content">
        <section class="about-section">
            <div class="section-header" style="text-align: center; margin-bottom: 2rem;">
                <h2 style="color: #ffffff; margin-bottom: 1rem;">{{PAGE_HEADING}}</h2>
            </div>
            
            <div class="job-details" style="max-width: 900px; margin: 0 auto; padding: 2rem; background: rgba(10, 25, 49, 0.7); border-radius: 10px;">
                <h3 style="color: #5ed6ff; margin-bottom: 0.5rem; font-size: 1.5rem;">
                    {{TITLE}}
                </h3>
                
                <div class="company-row" style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: #a0aec0;">
                    <span class="company" style="font-weight: 500;">
                        {{COMPANY}}
                    </span>
                    <span class="duration" style="font-style: italic;">
                        {{DURATION}}
                    </span>
                </div>
                
                <ul class="responsibilities" style="margin-bottom: 2rem; padding-left: 1.5rem;">
                    {{RESPONSIBILITIES}}
                </ul>
                
                <div class="skills-used" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem;">
                    {{SKILLS}}
                </div>
            </div>
        </section>
    </div>
    <a href="contact.html" class="contact-btn">Contact →</a>
</body>
</html>
